<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Self-Evolving App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-md mx-auto p-4">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6 py-4">
            <h1 class="text-xl font-bold text-slate-800">TOEFL <span class="text-blue-600">Smart</span></h1>
            <div id="score" class="text-sm font-semibold bg-blue-100 text-blue-700 px-3 py-1 rounded-full">Skor: 0</div>
        </header>

        <!-- Quiz Card -->
        <div id="quiz-card" class="bg-white rounded-2xl shadow-xl shadow-slate-200/60 p-6 border border-slate-100">
            <div id="loader" class="text-center py-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-slate-500">Mengambil soal terbaru...</p>
            </div>

            <div id="content" class="hidden">
                <span id="cat" class="text-[10px] uppercase tracking-widest font-bold text-blue-500 mb-2 block">STRUCTURE</span>
                <p id="ques" class="text-lg text-slate-800 font-medium leading-relaxed mb-6">Loading soal...</p>
                
                <div id="options-container" class="space-y-3">
                    <!-- Tombol Pilihan -->
                </div>

                <div id="feedback" class="mt-6 p-4 rounded-xl hidden">
                    <p id="feedback-text" class="text-sm font-medium"></p>
                    <button onclick="fetchQuestions()" class="mt-4 w-full bg-slate-800 text-white py-3 rounded-xl font-semibold hover:bg-slate-700">Soal Selanjutnya</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwvqLcEy-ftdez-jkdm-PYPl48RBIxopehxxz3XtjeM_dYdWjJGvz3UO9VWPuGHXEOjqg/exec";
        let score = 0;

        async function fetchQuestions() {
            document.getElementById('content').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('feedback').classList.add('hidden');

            try {
                const response = await fetch(WEB_APP_URL);
                const data = await response.json();
                // Ambil soal terakhir yang baru ditambahkan
                const latestQuestion = data[data.length - 1];
                displayQuestion(latestQuestion);
            } catch (error) {
                alert("Gagal mengambil data. Pastikan Web App sudah di-deploy ke 'Anyone'.");
            }
        }

        function displayQuestion(q) {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('ques').innerText = q.Question;
            document.getElementById('cat').innerText = q.Category;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            ['A', 'B', 'C', 'D'].forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-400 hover:bg-blue-50 transition-all duration-200 text-slate-700 font-medium";
                
                // Kode di bawah ini akan mencoba membaca 'Opt_A' atau 'A' agar tidak error
                const optionText = q['Opt_' + opt] || q[opt];
                
                btn.innerHTML = `<span class="text-blue-500 mr-2">${opt}.</span> ${optionText}`;
                btn.onclick = () => checkAnswer(opt, q.Key, q.Explanation);
                container.appendChild(btn);
            });
        }

        function checkAnswer(choice, correct, exp) {
            const feedback = document.getElementById('feedback');
            const feedbackText = document.getElementById('feedback-text');
            feedback.classList.remove('hidden');

            if (choice === correct) {
                score += 10;
                feedback.className = "mt-6 p-4 rounded-xl bg-green-50 text-green-700 border border-green-100";
                feedbackText.innerHTML = `<strong>Benar!</strong> <br> ${exp}`;
            } else {
                feedback.className = "mt-6 p-4 rounded-xl bg-red-50 text-red-700 border border-red-100";
                feedbackText.innerHTML = `<strong>Salah. Jawaban yang benar adalah ${correct}.</strong> <br> ${exp}`;
            }
            document.getElementById('score').innerText = `Skor: ${score}`;
        }

        // Mulai pertama kali
        fetchQuestions();
    </script>
</body>
</html>
