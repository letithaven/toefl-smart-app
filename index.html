<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Smart Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn {
            transition: all 0.2s ease;
        }
        .option-btn:not(:disabled):hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }
        .option-btn:disabled { cursor: not-allowed; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-md mx-auto p-4">
        <!-- Progress Bar -->
        <div class="w-full bg-slate-200 h-1.5 rounded-full mb-6 overflow-hidden">
            <div id="progress-bar" class="bg-blue-600 h-full transition-all duration-700" style="width: 0%"></div>
        </div>

        <!-- Header -->
        <header class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">TOEFL<span class="text-blue-600">Smart</span></h1>
                <p id="cat-label" class="text-[10px] font-bold uppercase tracking-widest text-blue-500">READY TO START</p>
            </div>
            <div class="text-right">
                <div id="timer" class="text-xl font-mono font-bold text-slate-700">00:00</div>
                <div id="score-display" class="text-xs font-bold text-slate-400">Score: 0</div>
            </div>
        </header>

       <!-- Selector Paket -->
<div class="mb-6">
    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 mb-2 block">Pilih Simulasi</label>
    <select id="packet-filter" onchange="initQuiz()" class="w-full p-4 rounded-2xl border-2 border-slate-100 bg-white text-slate-700 font-bold focus:border-blue-500 outline-none shadow-sm">
        <option value="All">Semua Soal (Campuran)</option>
        <option value="Paket 1">Simulasi Paket 1</option>
        <option value="Paket 2">Simulasi Paket 2</option>
        <option value="Paket 3">Simulasi Paket 3</option>
        <option value="Paket 4">Simulasi Paket 4</option>
    </select>
</div>

        <!-- Quiz Card -->
        <div id="quiz-card" class="bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-6 border border-white relative overflow-hidden">
            <!-- Loader -->
            <div id="loader" class="py-12 text-center">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-slate-400 font-medium">Fetching Questions...</p>
            </div>

            <!-- Content -->
            <div id="content" class="hidden">
                <p id="ques" class="text-lg text-slate-800 font-semibold leading-relaxed mb-8">...</p>
                
                <div id="options-container" class="space-y-3">
                    <!-- Buttons will appear here -->
                </div>

                <!-- Feedback Section -->
                <div id="feedback" class="mt-8 p-5 rounded-2xl hidden transition-all">
                    <p id="feedback-text" class="text-sm leading-relaxed"></p>
                    <button onclick="nextQuestion()" class="mt-5 w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-blue-600 transition-colors shadow-lg shadow-blue-200">
                        Next Question
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
       // 1. PASTIKAN LINK WEB APP KAMU SUDAH BENAR DI SINI
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWBhVE0vUqF2uBw5bZGM7aKiGD2RG-eKfAN_4lKUIf1cy4WMSb6XaVjCuhnKeiVEYQZw/exec";
        
        let allQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let seconds = 0;
        let timerInterval;

        async function initQuiz() {
            clearInterval(timerInterval);
            seconds = 0;
            updateTimerDisplay();
    
            const packet = document.getElementById('packet-filter').value;
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');

            content.classList.add('hidden');
            loader.classList.remove('hidden');
            loader.querySelector('p').innerText = "Fetching Questions...";
    
            try {
            const response = await fetch(`${WEB_APP_URL}?packet=${packet}`);
            allQuestions = await response.json();
        
        // LOGIKA PEMICU GENERATE OTOMATIS
            if((!allQuestions || allQuestions.length === 0) && packet !== "All") {
            loader.querySelector('p').innerHTML = `
                <span class="text-blue-600 font-bold">${packet} belum tersedia.</span><br>
                <span class="text-xs">AI sedang meracik soal baru untukmu secara otomatis...</span>
            `;
            
            // Memberitahu Apps Script untuk membuatkan soal baru
            await fetch(`${WEB_APP_URL}?action=generate&packet=${packet}`);
            
            // Refresh setelah generate selesai
            return initQuiz(); 
        }

        currentIndex = 0;
        if(allQuestions.length > 0) {
            startTimer();
            displayQuestion();
        }
    } catch (error) {
        loader.querySelector('p').innerText = "Gagal memuat soal. Pastikan koneksi internet stabil.";
    }
}

function displayQuestion() {
    const q = allQuestions[currentIndex];
    const progress = ((currentIndex + 1) / allQuestions.length) * 100;
    
    document.getElementById('progress-bar').style.width = `${progress}%`;
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('content').classList.remove('hidden');
    document.getElementById('feedback').classList.add('hidden');
    
    document.getElementById('cat-label').innerText = q.Category + " | " + (q.Packet || "Tanpa Paket");

    const container = document.getElementById('options-container');
    container.innerHTML = '';

    // --- FITUR PRO: BOX TEKS READING ---
    let questionText = q.Question;
    let readingBox = "";
    
    if (q.Category === "Reading" && questionText.includes("|||")) {
        const parts = questionText.split("|||");
        readingBox = `<div class="mb-6 p-4 bg-slate-100 rounded-2xl text-sm leading-relaxed text-slate-600 border-l-4 border-blue-500 max-h-60 overflow-y-auto italic">
                        ${parts[0]}
                      </div>`;
        questionText = parts[1]; // Soal aslinya setelah pemisah
    }

    // --- FITUR PRO: TOMBOL TTS LISTENING ---
    let listeningUI = "";
    if (q.Category === "Listening") {
        listeningUI = `
            <div class="mb-6 flex justify-center">
                <button onclick="playTTS('${questionText.replace(/'/g, "\\'")}')" class="flex items-center gap-2 bg-blue-600 text-white px-6 py-3 rounded-full hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    Dengarkan Audio
                </button>
            </div>`;
    }

    // Update tampilan soal
    document.getElementById('ques').innerHTML = `
        ${readingBox}
        ${listeningUI}
        <span class="${q.Category === 'Listening' ? 'hidden' : ''}">${questionText}</span>
    `;

    ['A', 'B', 'C', 'D'].forEach(opt => {
        const btn = document.createElement('button');
        btn.className = "option-btn w-full text-left p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 text-slate-700 font-bold hover:bg-white hover:border-blue-400";
        btn.innerHTML = `<span class="text-blue-500 mr-3">${opt}</span> ${q['Opt_' + opt] || q[opt]}`;
        btn.onclick = () => checkAnswer(opt, q.Key, q.Explanation, btn);
        container.appendChild(btn);
    });
}

// Fungsi untuk menjalankan suara (TTS)
function playTTS(text) {
    // Berhenti jika ada suara lain yang sedang berjalan
    window.speechSynthesis.cancel();
    
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US'; // Set bahasa Inggris
    msg.rate = 0.9;     // Kecepatan sedikit diperlambat agar jelas
    window.speechSynthesis.speak(msg);
}
        function checkAnswer(choice, correct, exp, clickedBtn) {
            clearInterval(timerInterval);
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            const feedback = document.getElementById('feedback');
            const feedbackText = document.getElementById('feedback-text');
            
            if (choice === correct) {
                score += 10;
                clickedBtn.classList.replace('border-slate-100', 'border-green-500');
                clickedBtn.classList.add('bg-green-50');
                feedback.className = "mt-8 p-5 rounded-2xl bg-green-50 text-green-800 border border-green-100 shadow-sm";
                feedbackText.innerHTML = `<b class="text-lg text-green-700">Correct!</b><br><span class="opacity-90">${exp}</span>`;
            } else {
                clickedBtn.classList.replace('border-slate-100', 'border-red-500');
                clickedBtn.classList.add('bg-red-50');
                feedback.className = "mt-8 p-5 rounded-2xl bg-red-50 text-red-800 border border-red-100 shadow-sm";
                feedbackText.innerHTML = `<b class="text-lg text-red-700">Incorrect. Answer: ${correct}</b><br><span class="opacity-90">${exp}</span>`;
            }
            
            feedback.classList.remove('hidden');
            document.getElementById('score-display').innerText = `Score: ${score}`;
        }

        function nextQuestion() {
            if (currentIndex < allQuestions.length - 1) {
                currentIndex++;
                startTimer();
                displayQuestion();
            } else {
                alert(`Latihan Selesai! Skor Akhir Anda: ${score}`);
                initQuiz();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${s}`;
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
