<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEFL Self-Evolving App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6 py-4">
            <h1 class="text-xl font-bold text-slate-800">TOEFL <span class="text-blue-600">Smart</span></h1>
            <div id="score-box" class="text-sm font-semibold bg-blue-100 text-blue-700 px-3 py-1 rounded-full">Skor: 0</div>
        </header>

        <!-- Filter Kategori -->
        <div class="mb-6">
            <select id="category-filter" onchange="fetchQuestions()" class="w-full p-3 rounded-xl border-2 border-slate-200 bg-white text-slate-700 font-medium focus:border-blue-500 outline-none">
                <option value="All">Semua Kategori</option>
                <option value="Structure">Structure & Written Expression</option>
                <option value="Reading">Reading Comprehension</option>
                <option value="Listening">Listening (Script)</option>
            </select>
        </div>

        <div id="quiz-card" class="bg-white rounded-2xl shadow-xl p-6 border border-slate-100">
            <div id="loader" class="text-center py-10">
                <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
                <p class="mt-4 text-slate-500">Memuat soal-soal...</p>
            </div>

            <div id="content" class="hidden">
                <div class="flex justify-between items-center mb-2">
                    <span id="cat" class="text-[10px] uppercase tracking-widest font-bold text-blue-500">STRUCTURE</span>
                    <span id="question-count" class="text-[10px] text-slate-400 font-bold">SOAL 1</span>
                </div>
                <p id="ques" class="text-lg text-slate-800 font-medium leading-relaxed mb-6">...</p>
                
                <div id="options-container" class="space-y-3"></div>

                <div id="feedback" class="mt-6 p-4 rounded-xl hidden">
                    <p id="feedback-text" class="text-sm font-medium"></p>
                    <button onclick="nextQuestion()" class="mt-4 w-full bg-slate-800 text-white py-3 rounded-xl font-semibold hover:bg-slate-700 transition-colors">Soal Berikutnya</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWBhVE0vUqF2uBw5bZGM7aKiGD2RG-eKfAN_4lKUIf1cy4WMSb6XaVjCuhnKeiVEYQZw/exec";
        let allQuestions = [];
        let currentIndex = 0;
        let score = 0;

        async function fetchQuestions() {
            const cat = document.getElementById('category-filter').value;
            document.getElementById('content').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');
            
            try {
                const response = await fetch(`${WEB_APP_URL}?cat=${cat}`);
                allQuestions = await response.json();
                currentIndex = 0;
                if(allQuestions.length > 0) {
                    displayQuestion();
                } else {
                    document.getElementById('loader').innerHTML = "Belum ada soal di kategori ini.";
                }
            } catch (error) {
                alert("Gagal mengambil data.");
            }
        }

        function displayQuestion() {
            const q = allQuestions[currentIndex];
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('feedback').classList.add('hidden');
            
            document.getElementById('ques').innerText = q.Question;
            document.getElementById('cat').innerText = q.Category;
            document.getElementById('question-count').innerText = `SOAL ${currentIndex + 1} / ${allQuestions.length}`;

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            ['A', 'B', 'C', 'D'].forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-400 hover:bg-blue-50 transition-all text-slate-700 font-medium";
                btn.innerHTML = `<span class="text-blue-500 mr-2">${opt}.</span> ${q['Opt_' + opt] || q[opt]}`;
                btn.onclick = () => checkAnswer(opt, q.Key, q.Explanation, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(choice, correct, exp, clickedBtn) {
            const feedback = document.getElementById('feedback');
            const feedbackText = document.getElementById('feedback-text');
            
            // Disable semua tombol agar tidak bisa klik dua kali
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(b => b.disabled = true);

            if (choice === correct) {
                score += 10;
                clickedBtn.classList.add('border-green-500', 'bg-green-50');
                feedback.className = "mt-6 p-4 rounded-xl bg-green-50 text-green-700 border border-green-100";
                feedbackText.innerHTML = `<strong>Benar!</strong><br>${exp}`;
            } else {
                clickedBtn.classList.add('border-red-500', 'bg-red-50');
                feedback.className = "mt-6 p-4 rounded-xl bg-red-50 text-red-700 border border-red-100";
                feedbackText.innerHTML = `<strong>Salah! Jawaban: ${correct}</strong><br>${exp}`;
            }
            feedback.classList.remove('hidden');
            document.getElementById('score-box').innerText = `Skor: ${score}`;
        }

        function nextQuestion() {
            if (currentIndex < allQuestions.length - 1) {
                currentIndex++;
                displayQuestion();
            } else {
                alert("Latihan selesai! Kamu sudah mengerjakan semua soal di sesi ini.");
                fetchQuestions(); // Refresh soal
            }
        }

        window.onload = fetchQuestions;
    </script>
</body>
</html>
